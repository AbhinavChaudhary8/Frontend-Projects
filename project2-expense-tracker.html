<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spendr — Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e5e0d6;
    --border2: #d4cec2;
    --text: #1a1814;
    --text2: #6b6560;
    --text3: #9e9890;
    --accent: #1a1814;
    --green: #1a6644;
    --green-bg: #e8f5ee;
    --red: #b83232;
    --red-bg: #fdeaea;
    --blue: #1a4a8a;
    --blue-bg: #e8eef8;
    --amber: #8a5a00;
    --amber-bg: #fdf5e0;
    --purple: #5a2d8a;
    --purple-bg: #f0eafa;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Epilogue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- HEADER ---- */
  .header {
    background: var(--accent);
    color: #f7f5f0;
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header-logo span { opacity: 0.4; }
  .header-month {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
  }
  .month-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #f7f5f0;
    width: 28px; height: 28px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: background 0.15s;
  }
  .month-btn:hover { background: rgba(255,255,255,0.2); }
  #current-month-label { min-width: 120px; text-align: center; font-family: 'Syne', sans-serif; font-weight: 600; }

  /* ---- LAYOUT ---- */
  .app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* ---- BALANCE STRIP ---- */
  .balance-strip {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .balance-main {
    background: var(--accent);
    color: #f7f5f0;
    border-radius: var(--radius);
    padding: 1.5rem 1.8rem;
    position: relative;
    overflow: hidden;
  }
  .balance-main::after {
    content: '₹';
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Syne', sans-serif;
    font-size: 80px;
    font-weight: 800;
    opacity: 0.06;
  }
  .balance-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 6px; }
  .balance-amount { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; }
  .balance-sub { font-size: 12px; opacity: 0.5; margin-top: 4px; }

  .balance-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.3rem 1.5rem;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .balance-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 6px; }
  .balance-card-amount { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .balance-card-amount.income { color: var(--green); }
  .balance-card-amount.expense { color: var(--red); }
  .balance-card-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* ---- MAIN GRID ---- */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1rem;
    align-items: start;
  }

  /* ---- LEFT COLUMN ---- */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.4rem;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .card-body { padding: 1.4rem; }

  /* Add Transaction */
  .add-form { margin-bottom: 1rem; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Epilogue', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); background: var(--surface); }
  .form-input::placeholder { color: var(--text3); }
  .form-select {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Epilogue', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface); }

  .type-toggle { display: flex; gap: 6px; }
  .type-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-family: 'Epilogue', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
    color: var(--text2);
  }
  .type-btn.income.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .type-btn.expense.active { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #f7f5f0;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .submit-btn:hover { opacity: 0.85; }

  /* Transactions List */
  .tx-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .tx-filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Epilogue', sans-serif;
    transition: all 0.15s;
  }
  .tx-filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .tx-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #f7f5f0; }

  .tx-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
  .tx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    border: 1px solid var(--border);
    transition: border-color 0.15s;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .tx-item:hover { border-color: var(--border2); }
  .tx-cat-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .tx-info { flex: 1; }
  .tx-desc { font-size: 13px; font-weight: 500; }
  .tx-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .tx-amount { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-del {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 13px; padding: 4px 6px;
    border-radius: 6px; transition: all 0.15s;
  }
  .tx-del:hover { color: var(--red); background: var(--red-bg); }

  .empty-tx { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }

  /* ---- RIGHT COLUMN ---- */
  .right-col { display: flex; flex-direction: column; gap: 1rem; }

  /* Chart */
  .chart-wrap { padding: 1rem; }
  canvas { max-height: 200px; }

  /* Category Breakdown */
  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-row { display: flex; align-items: center; gap: 10px; }
  .cat-icon-sm {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .cat-name { font-size: 12px; font-weight: 500; flex: 1; }
  .cat-bar-wrap { flex: 2; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .cat-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
  .cat-amount { font-size: 12px; font-weight: 600; font-family: 'Syne', sans-serif; min-width: 60px; text-align: right; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: #f7f5f0;
    border-radius: var(--radius-sm);
    padding: 10px 18px; font-size: 13px; font-weight: 500;
    z-index: 1000;
    animation: toastIn 0.25s ease;
    pointer-events: none;
    font-family: 'Syne', sans-serif;
  }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">Spendr<span>.</span></div>
  <div class="header-month">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span id="current-month-label">—</span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
</header>

<div class="app">

  <!-- Balance Strip -->
  <div class="balance-strip">
    <div class="balance-main">
      <div class="balance-label">Net Balance</div>
      <div class="balance-amount" id="stat-balance">₹0</div>
      <div class="balance-sub" id="stat-balance-sub">This month</div>
    </div>
    <div class="balance-card">
      <div class="balance-card-label">Income</div>
      <div class="balance-card-amount income" id="stat-income">₹0</div>
      <div class="balance-card-sub" id="stat-income-count">0 transactions</div>
    </div>
    <div class="balance-card">
      <div class="balance-card-label">Expenses</div>
      <div class="balance-card-amount expense" id="stat-expense">₹0</div>
      <div class="balance-card-sub" id="stat-expense-count">0 transactions</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- LEFT -->
    <div style="display:flex;flex-direction:column;gap:1rem;">

      <!-- Add Transaction -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Add Transaction</div>
        </div>
        <div class="card-body">
          <div class="add-form">
            <div class="type-toggle" style="margin-bottom:8px;">
              <button class="type-btn income active" id="btn-income" onclick="setType('income')">+ Income</button>
              <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">− Expense</button>
            </div>
            <div class="form-row">
              <input class="form-input" id="tx-desc" placeholder="Description (e.g. Salary, Rent...)">
              <input class="form-input" id="tx-amount" type="number" placeholder="Amount (₹)" style="max-width:140px;" min="1">
            </div>
            <div class="form-row">
              <select class="form-select" id="tx-category">
                <option value="food">🍔 Food</option>
                <option value="transport">🚗 Transport</option>
                <option value="shopping">🛍️ Shopping</option>
                <option value="health">💊 Health</option>
                <option value="entertainment">🎬 Entertainment</option>
                <option value="bills">💡 Bills</option>
                <option value="education">📚 Education</option>
                <option value="salary">💼 Salary</option>
                <option value="freelance">💻 Freelance</option>
                <option value="other">📦 Other</option>
              </select>
              <input class="form-input" id="tx-date" type="date" style="max-width:160px;">
            </div>
            <button class="submit-btn" onclick="addTransaction()">Add Transaction</button>
          </div>
        </div>
      </div>

      <!-- Transactions -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Transactions</div>
          <div class="tx-filters">
            <button class="tx-filter-btn active" onclick="setTxFilter('all',this)">All</button>
            <button class="tx-filter-btn" onclick="setTxFilter('income',this)">Income</button>
            <button class="tx-filter-btn" onclick="setTxFilter('expense',this)">Expense</button>
          </div>
        </div>
        <div class="card-body" style="padding-top:0.8rem;">
          <div class="tx-list" id="tx-list"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">

      <!-- Donut Chart -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Spending by Category</div>
        </div>
        <div class="chart-wrap">
          <canvas id="donut-chart"></canvas>
          <p id="no-chart-msg" style="text-align:center;color:var(--text3);font-size:12px;padding:1rem;display:none;">No expenses this month</p>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Monthly Overview</div>
        </div>
        <div class="chart-wrap">
          <canvas id="bar-chart"></canvas>
        </div>
      </div>

      <!-- Category Breakdown -->
      <div class="card">
        <div class="card-header"><div class="card-title">Category Breakdown</div></div>
        <div class="card-body">
          <div class="cat-list" id="cat-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ---- DATA ----
const CATEGORIES = {
  food:          { icon: '🍔', color: '#d4522a', bg: '#fdeee8' },
  transport:     { icon: '🚗', color: '#1a6644', bg: '#e8f5ee' },
  shopping:      { icon: '🛍️', color: '#5a2d8a', bg: '#f0eafa' },
  health:        { icon: '💊', color: '#b83232', bg: '#fdeaea' },
  entertainment: { icon: '🎬', color: '#1a4a8a', bg: '#e8eef8' },
  bills:         { icon: '💡', color: '#8a5a00', bg: '#fdf5e0' },
  education:     { icon: '📚', color: '#2d6a8a', bg: '#e8f2fa' },
  salary:        { icon: '💼', color: '#1a6644', bg: '#e8f5ee' },
  freelance:     { icon: '💻', color: '#1a6644', bg: '#e8f5ee' },
  other:         { icon: '📦', color: '#6b6560', bg: '#f0ede6' },
};

let txType = 'income';
let txFilter = 'all';
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();
let transactions = [];
let donutChart = null;
let barChart = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function save() { localStorage.setItem('spendr_tx', JSON.stringify(transactions)); }
function load() {
  const raw = localStorage.getItem('spendr_tx');
  transactions = raw ? JSON.parse(raw) : getSampleData();
  if (!raw) save();
}

function getSampleData() {
  const m = String(new Date().getMonth()+1).padStart(2,'0');
  const y = new Date().getFullYear();
  return [
    { id:uid(), type:'income',  desc:'Monthly Salary',    amount:50000, category:'salary',        date:`${y}-${m}-01` },
    { id:uid(), type:'expense', desc:'Apartment Rent',    amount:12000, category:'bills',          date:`${y}-${m}-02` },
    { id:uid(), type:'expense', desc:'Groceries',         amount:3200,  category:'food',           date:`${y}-${m}-05` },
    { id:uid(), type:'income',  desc:'Freelance Project', amount:15000, category:'freelance',      date:`${y}-${m}-08` },
    { id:uid(), type:'expense', desc:'Metro Card',        amount:800,   category:'transport',      date:`${y}-${m}-10` },
    { id:uid(), type:'expense', desc:'Netflix + Spotify', amount:1200,  category:'entertainment',  date:`${y}-${m}-12` },
    { id:uid(), type:'expense', desc:'Gym Membership',    amount:1500,  category:'health',         date:`${y}-${m}-14` },
    { id:uid(), type:'expense', desc:'Online Course',     amount:2500,  category:'education',      date:`${y}-${m}-16` },
    { id:uid(), type:'expense', desc:'Weekend Outing',    amount:1800,  category:'food',           date:`${y}-${m}-18` },
    { id:uid(), type:'expense', desc:'New Clothes',       amount:3500,  category:'shopping',       date:`${y}-${m}-20` },
  ];
}

// ---- ACTIONS ----
function setType(t) {
  txType = t;
  document.getElementById('btn-income').classList.toggle('active', t==='income');
  document.getElementById('btn-expense').classList.toggle('active', t==='expense');
  const catSelect = document.getElementById('tx-category');
  // suggest relevant categories
  if (t === 'income') {
    catSelect.value = 'salary';
  } else {
    catSelect.value = 'food';
  }
}

function setTxFilter(f, btn) {
  txFilter = f;
  document.querySelectorAll('.tx-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTxList();
}

function addTransaction() {
  const desc   = document.getElementById('tx-desc').value.trim();
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const cat    = document.getElementById('tx-category').value;
  const date   = document.getElementById('tx-date').value || new Date().toISOString().split('T')[0];
  if (!desc) { showToast('Enter a description'); return; }
  if (!amount || amount <= 0) { showToast('Enter a valid amount'); return; }
  transactions.unshift({ id: uid(), type: txType, desc, amount, category: cat, date });
  save();
  render();
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-amount').value = '';
  showToast(txType === 'income' ? '+ Income added' : '− Expense added');
}

function deleteTx(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  render();
}

function changeMonth(d) {
  viewMonth += d;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  render();
}

// ---- FILTER ----
function getMonthTx() {
  return transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
  });
}

// ---- RENDER ----
function render() {
  updateMonthLabel();
  updateStats();
  renderTxList();
  renderDonut();
  renderBar();
  renderCatBreakdown();
}

function updateMonthLabel() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('current-month-label').textContent = `${months[viewMonth]} ${viewYear}`;
}

function updateStats() {
  const mtx = getMonthTx();
  const income  = mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount, 0);
  const expense = mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount, 0);
  const balance = income - expense;
  document.getElementById('stat-balance').textContent = '₹' + fmtNum(Math.abs(balance));
  document.getElementById('stat-balance-sub').textContent = balance >= 0 ? 'Surplus this month' : 'Deficit this month';
  document.getElementById('stat-income').textContent = '₹' + fmtNum(income);
  document.getElementById('stat-income-count').textContent = mtx.filter(t=>t.type==='income').length + ' transactions';
  document.getElementById('stat-expense').textContent = '₹' + fmtNum(expense);
  document.getElementById('stat-expense-count').textContent = mtx.filter(t=>t.type==='expense').length + ' transactions';
}

function renderTxList() {
  const mtx = getMonthTx();
  let list = txFilter === 'all' ? mtx : mtx.filter(t=>t.type===txFilter);
  const container = document.getElementById('tx-list');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-tx">No transactions this month</div>';
    return;
  }
  container.innerHTML = list.map(t => {
    const cat = CATEGORIES[t.category] || CATEGORIES.other;
    const sign = t.type === 'income' ? '+' : '−';
    return `
    <div class="tx-item">
      <div class="tx-cat-icon" style="background:${cat.bg}">${cat.icon}</div>
      <div class="tx-info">
        <div class="tx-desc">${escHtml(t.desc)}</div>
        <div class="tx-meta">${t.category} · ${t.date}</div>
      </div>
      <div class="tx-amount ${t.type}">${sign}₹${fmtNum(t.amount)}</div>
      <button class="tx-del" onclick="deleteTx('${t.id}')">✕</button>
    </div>`;
  }).join('');
}

function renderDonut() {
  const mtx = getMonthTx().filter(t => t.type === 'expense');
  const catTotals = {};
  mtx.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });
  const entries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);

  const noMsg = document.getElementById('no-chart-msg');
  const canvas = document.getElementById('donut-chart');

  if (entries.length === 0) {
    noMsg.style.display = 'block';
    canvas.style.display = 'none';
    if (donutChart) { donutChart.destroy(); donutChart = null; }
    return;
  }
  noMsg.style.display = 'none';
  canvas.style.display = 'block';

  const labels = entries.map(([k]) => (CATEGORIES[k]?.icon || '📦') + ' ' + k);
  const data   = entries.map(([,v]) => v);
  const colors = entries.map(([k]) => CATEGORIES[k]?.color || '#888');

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(canvas, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }] },
    options: {
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: 'Epilogue', size: 11 }, padding: 12, boxWidth: 10 } },
        tooltip: { callbacks: { label: ctx => ` ₹${fmtNum(ctx.raw)}` } }
      }
    }
  });
}

function renderBar() {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // last 6 months
  const labels = [], incomeData = [], expenseData = [];
  for (let i = 5; i >= 0; i--) {
    let m = viewMonth - i, y = viewYear;
    if (m < 0) { m += 12; y--; }
    labels.push(months[m]);
    const mtx = transactions.filter(t => { const d = new Date(t.date); return d.getMonth()===m && d.getFullYear()===y; });
    incomeData.push(mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0));
    expenseData.push(mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0));
  }
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Income', data: incomeData, backgroundColor: '#1a6644', borderRadius: 5, barPercentage: 0.55 },
        { label: 'Expense', data: expenseData, backgroundColor: '#b83232', borderRadius: 5, barPercentage: 0.55 },
      ]
    },
    options: {
      plugins: { legend: { labels: { font: { family:'Epilogue', size:11 }, boxWidth:10 } } },
      scales: {
        x: { grid: { display:false }, ticks: { font:{family:'Epilogue',size:11} } },
        y: { grid: { color:'#f0ede6' }, ticks: { font:{family:'Epilogue',size:11}, callback: v => '₹'+fmtNum(v) } }
      }
    }
  });
}

function renderCatBreakdown() {
  const mtx = getMonthTx().filter(t => t.type === 'expense');
  const catTotals = {};
  let total = 0;
  mtx.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; total += t.amount; });
  const entries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const container = document.getElementById('cat-list');
  if (entries.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--text3);text-align:center;padding:1rem;">No expenses this month</p>';
    return;
  }
  container.innerHTML = entries.map(([cat, amt]) => {
    const c = CATEGORIES[cat] || CATEGORIES.other;
    const pct = total ? Math.round(amt / total * 100) : 0;
    return `
    <div class="cat-row">
      <div class="cat-icon-sm" style="background:${c.bg}">${c.icon}</div>
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${c.color}"></div></div>
      <div class="cat-amount">₹${fmtNum(amt)}</div>
    </div>`;
  }).join('');
}

// ---- UTILS ----
function fmtNum(n) { return Math.round(n).toLocaleString('en-IN'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ---- INIT ----
document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
load();
render();
</script>
</body>
